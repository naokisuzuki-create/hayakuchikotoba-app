<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>カミカミ★パラダイス 舌こんがらがり選手権</title>
  <style>
    :root{
      --bg:#fff8ef; --ink:#1f1e1c; --muted:#6b6a68; --card:#ffffff; --accent:#ff5db1;
      --topbar-h:56px; /* ヘッダー高さ */
    }
    html,body{height:100%;}
    body{
      margin:0; background:var(--bg); color:var(--ink);
      font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",sans-serif;
      overflow:hidden; /* 画面切替でのページスクロール防止 */
    }

    /* 画面は「ヘッダー(固定) + 本体(重ねた3画面)」の2行構成 */
    .app{
      min-height:100svh;
      display:grid;
      grid-template-rows: var(--topbar-h) 1fr;
    }
    .topbar{
      height: var(--topbar-h);
      box-sizing: border-box;
      display:flex; gap:12px; align-items:center; justify-content:space-between;
      padding:12px 16px;
    }
    .brand{font-weight:800; letter-spacing:.02em;}

    /* 3画面のラッパ：ここに重ねて表示する */
    .screens{
      position:relative;
      height:100%;
      min-height:0;  /* Safari 対策 */
      overflow:hidden;
    }

    /* 画面：重ねておき、active だけ表示 */
    .screen{
      position:absolute; inset:0;
      display:none;       /* 非表示 */
      place-items:center; /* active時に中央寄せ */
    }
    .screen.active{ display:grid; }

    /* ===== タイトル/終了画面（背景ぼかし＋暗めオーバーレイ） ===== */
    .title-screen{
      width:100%; height:100%; overflow:hidden;
      /* display:grid;  ← A案：削除（activeだけ表示される） */
      /* place-items:center; ← .screen.activeが担当 */
    }
    .title-screen::before{
      content:""; position:absolute; inset:-32px; /* 端欠け防止 */
      background:url("images/053.png") center/cover no-repeat;
      transform:scale(1.06); filter:blur(10px);
      z-index:0; pointer-events:none;
    }
    .title-screen::after{
      content:""; position:absolute; inset:0;
      background:rgba(0,0,0,.40);
      z-index:1; pointer-events:none;
    }
    .title-block{
      position:relative; z-index:2;
      display:grid; gap:10px; justify-items:center; text-align:center;
      color:#fff; text-shadow:0 4px 12px rgba(0,0,0,.85);
      padding:0 16px;
    }
    .title-main{font-weight:900; letter-spacing:.02em; font-size:clamp(32px,7vw,72px);}
    .title-sub {font-weight:700; opacity:.9; font-size:clamp(18px,3.5vw,32px);}
    .start-btn{
      margin-top:18px; appearance:none; border:0; border-radius:16px;
      padding:14px 22px; font-size:18px; font-weight:900; cursor:pointer;
      background:var(--accent); color:#fff; box-shadow:0 8px 18px rgba(0,0,0,.12);
    }

    /* ===== カウントダウン画面 ===== */
    .countdown-wrap{
      display:grid; place-items:center;
      inline-size:100%; block-size:100%;
      background:rgba(0,0,0,.35);
    }
    .count{
      font-weight:900; color:#fff;
      font-size:clamp(48px,12vw,120px);
      text-shadow:0 8px 28px rgba(0,0,0,.55);
      animation:pulse .8s ease both;
    }
    @keyframes pulse{
      0%{transform:scale(.6);opacity:.6}
      70%{transform:scale(1.05);opacity:1}
      100%{transform:scale(1);opacity:1}
    }

    /* ===== ゲーム画面 ===== */
    .card{
      margin:120px auto;  /* 画面中央に寄せつつ上下余白 */
      background:var(--card); border-radius:20px;
      box-shadow:0 8px 24px rgba(0,0,0,.08);
      display:grid; grid-template-rows:auto auto 1fr auto;

      /* 高さを一回り縮める */
      min-height:calc(80svh - var(--topbar-h) - 48px);

      /* 横幅を90%に制限 */
      max-width:80%;
    }
    .text{padding:8px 16px 0; text-align:center;}
    .reading{margin-bottom:6px; color:var(--muted); font-size:clamp(16px,3.6vw,28px);}
    .title{font-weight:800; line-height:1.25; font-size:clamp(20px,4.2vw,40px);}
    .stage{display:grid; place-items:center; padding:8px 8px 0;}
    .imgwrap{width:100%; height:100%; display:grid; place-items:center; padding:8px;}
    img.art{max-width:100%; max-height:60vh; object-fit:contain; border-radius:16px;}
    .meta{display:flex; align-items:center; justify-content:space-between; padding:12px 16px 16px;}
    .stars{font-size:clamp(18px,4vw,32px);}
    .controls{display:flex; gap:10px; align-items:center; justify-content:center; padding:12px 16px 20px;}
    button{appearance:none; border:0; border-radius:14px; padding:14px 18px; font-size:18px; font-weight:700; cursor:pointer; background:#1f1e1c; color:#fff; box-shadow:0 6px 16px rgba(0,0,0,.15);}
    button.secondary{background:#e9e7e2; color:#222;}
    .tap{color:var(--muted); font-size:14px; text-align:center; margin-top:-6px; margin-bottom:6px;}
    .err{color:#c00; font-size:14px; margin-top:8px; white-space:pre-wrap}
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">カミカミ★パラダイス</div>
      <div id="count" aria-live="polite" style="color:var(--muted);"></div>
    </header>

    <!-- 3(+1)画面を1つのラッパで重ねる -->
    <div class="screens">
      <!-- タイトル画面 -->
      <section id="titleScreen" class="screen title-screen active">
        <div class="title-block">
          <div class="title-main">カミカミ★パラダイス</div>
          <div class="title-sub">舌こんがらがり選手権</div>
          <button id="startBtn" class="start-btn" title="はじめる">はじめる</button>
        </div>
      </section>

      <!-- カウントダウン画面 -->
      <section id="countdownScreen" class="screen" aria-live="polite">
        <div class="countdown-wrap"><div id="countNum" class="count">3</div></div>
      </section>

      <!-- ゲーム画面 -->
      <main id="gameScreen" class="screen">
        <section class="card" id="card" title="画面タップでも次へ進めます">
          <div class="text">
            <div class="reading" id="reading"></div>
            <div class="title" id="title">読み込み中…</div>
            <div class="err" id="err"></div>
          </div>
          <div class="stage">
            <div class="imgwrap">
              <img class="art" id="art" alt="イラスト" decoding="async" />
            </div>
          </div>
          <div class="meta">
            <div class="stars" id="stars" aria-label="難易度"></div>
            <div class="tap">（タップでも次へ）</div>
          </div>
        </section>

        <footer class="controls">
          <button id="prev" class="secondary" title="ひとつ前">← もどる</button>
          <button id="next" title="次のカード">次へ →</button>
        </footer>
      </main>

      <!-- 終了画面 -->
      <section id="endScreen" class="screen title-screen">
        <div class="title-block">
          <div class="title-main">しゅうりょう～！</div>
          <div class="title-sub">おつかれさまでした</div>
          <button id="restartBtn" class="start-btn">もう一度</button>
        </div>
      </section>
    </div>
  </div>

  <script>
    // ===== 設定 =====
    const PRIMARY_DATA = "data/hayakuchikotoba_manifest.json";
    const IMG_BASE = "images/";
    const DATA_CANDIDATES = [
      PRIMARY_DATA,
      "./hayakuchikotoba_manifest.json",
      "./data/hayakuchikotoba_manifest.json",
    ];

    // 要素
    const readingEl = document.getElementById('reading');
    const titleEl   = document.getElementById('title');
    const starsEl   = document.getElementById('stars');
    const countEl   = document.getElementById('count');
    const artEl     = document.getElementById('art');
    const errEl     = document.getElementById('err');

    // 状態
    let cards = [];    // { id, title, reading, difficulty }
    let order = [];    // シャッフル済みインデックス
    let idx = 0;
    let isCounting = false; // カウントダウン中フラグ

    // Util
    const wait = (ms)=>new Promise(r=>setTimeout(r,ms));
    const shuffle = (arr)=>{
      const a = arr.slice();
      for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
      return a;
    };
    const setError = (msg)=>{ titleEl.textContent='読み込みエラー'; readingEl.textContent=msg||''; };

    // 画面切替
    function show(id){
      ['titleScreen','countdownScreen','gameScreen','endScreen']
        .forEach(x=>document.getElementById(x).classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // 描画
    function render(){
      if(!cards.length) return;
      const item = cards[order[idx]];
      readingEl.textContent = item.reading || '';
      titleEl.textContent   = item.title   || '';
      starsEl.textContent   = item.difficulty || '';
      countEl.textContent   = `${idx+1} / ${cards.length}`;
      const src = IMG_BASE + item.id + ".png";
      artEl.alt = item.title || "イラスト";
      artEl.src = encodeURI(src);
      // 先読み
      const nextItem = cards[order[(idx+1)%order.length]];
      if(nextItem){ const pre = new Image(); pre.src = encodeURI(IMG_BASE + nextItem.id + ".png"); }
    }

    // カウントダウン
    async function startCountdown(nextStep){
      if(isCounting) return; // 二重起動防止
      isCounting = true;
      show('countdownScreen');
      for(const n of ['3','2','1']){
        const el=document.getElementById('countNum');
        el.textContent=n; el.style.animation='none'; void el.offsetWidth; el.style.animation='pulse .8s ease both';
        await wait(900);
      }
      if(typeof nextStep === 'function') nextStep();
      isCounting = false;
    }

    // ナビ（次へ）
    function goNext(){
      if(isCounting || !order.length) return;

      // 最後の問題の後は終了画面へ
      if(idx === order.length - 1){
        startCountdown(()=>{
          show('endScreen');
        });
        return;
      }

      // 通常進行
      startCountdown(()=>{
        show('gameScreen');
        idx = (idx + 1);
        render();
      });
    }

    // ナビ（もどる）※終了には遷移しない
    function goPrev(){
      if(isCounting || !order.length) return;
      startCountdown(()=>{
        show('gameScreen');
        idx = (idx - 1 + order.length) % order.length;
        render();
      });
    }

    // キー操作
    function onKey(e){
      if(isCounting) return;
      const gameActive = document.getElementById('gameScreen').classList.contains('active');
      if(gameActive && (e.key==='ArrowRight'||e.key==='Enter'||e.key===' ')){ goNext(); }
      if(gameActive && e.key==='ArrowLeft'){ goPrev(); }
    }

    // マニフェスト取得
    async function fetchFirstOk(urls){
      const errors=[];
      for(const u of urls){
        const url=u+(u.includes('?')?'&':'?')+'v='+Date.now(); // キャッシュ回避
        try{
          const res=await fetch(url,{cache:'no-store'});
          if(res.ok) return {ok:true,json:await res.json(),url:u};
          errors.push(`${u} → HTTP ${res.status}`);
        }catch(e){ errors.push(`${u} → ${e.message}`); }
      }
      return {ok:false,errors};
    }

    async function boot(){
      const result=await fetchFirstOk(DATA_CANDIDATES);
      if(!result.ok){ setError('マニフェストを読み込めませんでした'); errEl.textContent='試したURL:\n'+result.errors.join('\n'); return; }
      try{
        const raw=Array.isArray(result.json)?result.json:[];
        cards=raw.filter(r=>r&&r.id);
        if(!cards.length){ setError('カードがありません（JSONが空の可能性）'); errEl.textContent=`読み込んだURL: ${result.url}`; return; }
        order=shuffle([...cards.keys()]); idx=0; errEl.textContent='';
      }catch(e){ setError('JSONの解析に失敗しました'); errEl.textContent=`URL: ${result.url}\nError: ${e.message}`; }
    }

    // イベント
    document.getElementById('startBtn').addEventListener('click', ()=>{
      // 最初の開始：タイトル→カウントダウン→ゲーム1枚目描画
      startCountdown(()=>{
        show('gameScreen');
        render();
      });
    });
    document.getElementById('next').addEventListener('click', goNext);
    document.getElementById('prev').addEventListener('click', goPrev);
    document.getElementById('card').addEventListener('click', goNext);
    window.addEventListener('keydown', onKey);

    // 再スタート
    document.getElementById('restartBtn').addEventListener('click', ()=>{
      order = shuffle([...cards.keys()]);
      idx = 0;
      startCountdown(()=>{
        show('gameScreen');
        render();
      });
    });

    // 起動
    boot();
  </script>
</body>
</html>
