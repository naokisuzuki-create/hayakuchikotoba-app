<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>早口言葉アプリ（試作）</title>
  <style>
    :root{
      --bg:#fff8ef; --ink:#1f1e1c; --muted:#6b6a68; --card:#ffffff; --accent:#4f8cff;
    }
    html,body{height:100%;}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",sans-serif;}
    .app{min-height:100%;display:grid;grid-template-rows:auto 1fr auto;}
    .topbar{display:flex;gap:12px;align-items:center;justify-content:space-between;padding:12px 16px;}
    .brand{font-weight:800;letter-spacing:.02em;}
    .card{margin:0 12px 12px;background:var(--card);border-radius:20px;box-shadow:0 8px 24px rgba(0,0,0,.08);display:grid;grid-template-rows:auto auto 1fr auto;min-height:calc(100vh - 120px);}    
    .text{padding:8px 16px 0; text-align:center !important;}
    .title{font-weight:800;line-height:1.25;font-size:clamp(20px, 4.2vw, 40px); text-align:center !important; margin:0 auto;}
    .reading{margin-bottom:6px;color:var(--muted);font-size:clamp(16px, 3.6vw, 28px); text-align:center !important; margin-left:auto; margin-right:auto;}
    .stage{display:grid;place-items:center;padding:8px 8px 0;}
    .imgwrap{width:100%;height:100%;display:grid;place-items:center;padding:8px;}
    img.art{max-width:100%;max-height:60vh;object-fit:contain;border-radius:16px;}
    .meta{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 16px;}
    .stars{font-size:clamp(18px, 4vw, 32px);}
    .controls{display:flex;gap:10px;align-items:center;justify-content:center;padding:12px 16px 20px;}
    button{appearance:none;border:0;border-radius:14px;padding:14px 18px;font-size:18px;font-weight:700;cursor:pointer;background:var(--ink);color:#fff;box-shadow:0 6px 16px rgba(0,0,0,.15);} 
    button.secondary{background:#e9e7e2;color:#222;}
    .tap{color:var(--muted);font-size:14px;text-align:center;margin-top:-6px;margin-bottom:6px;}
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">早口言葉アプリ（試作）</div>
      <div id="count" aria-live="polite" style="color:var(--muted);"></div>
    </header>

    <main class="card" id="card">
      <div class="text">
        <div class="reading" id="reading"></div>
        <div class="title" id="title">読み込み中…</div>
      </div>
      <div class="stage" id="stage" title="画面タップでも次へ進めます">
        <div class="imgwrap">
          <img class="art" id="art" alt="イラスト" decoding="async" />
        </div>
      </div>
      <div class="meta">
        <div class="stars" id="stars" aria-label="難易度"></div>
        <div class="tap">（タップでも次へ）</div>
      </div>
    </main>

    <footer class="controls">
      <button id="prev" class="secondary" title="ひとつ前">← もどる</button>
      <button id="next" title="次のカード">次へ →</button>
    </footer>
  </div>

  <script>
    // ===== 設定 =====
    const DATA_URL = "data/hayakuchikotoba_manifest.json";
    const IMG_BASE = "images/";

    // ===== 文字種ゆれ等の吸収ヘルパー =====
    const toKatakana = s => s.replace(/[\u3041-\u3096]/g, ch => String.fromCharCode(ch.charCodeAt(0)+0x60));
    const toHiragana = s => s.replace(/[\u30A1-\u30F6]/g, ch => String.fromCharCode(ch.charCodeAt(0)-0x60));
    function z2h(s){
      return s
        .replace(/[！-～]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)) // 英数記号
        .replace(/\u3000/g, ' '); // 全角スペース
    }
    const segEnc = p => p.split('/').map(x => encodeURIComponent(x)).join('/');

    // filename→試行URL候補を生成（重複は除去）
    function candidates(raw){
      const base = String(raw ?? '').normalize('NFC').replace(/\\/g,'/');
      const list = new Set();

      const add = s => { if (s) list.add(segEnc(s)); };

      // 基本クリーニング
      let s = base.trim()
        .replace(/\s+(\.[^.]+)$/, '$1') // 拡張子直前の空白除去
        .replace(/\s{2,}/g, ' ');       // 連続スペース潰し
      add(s);
      add(z2h(s));                      // 全角→半角
      add(toKatakana(s));               // ひら→カナ
      add(toHiragana(s));               // カナ→ひら
      add(z2h(toKatakana(s)));          // 合わせ技
      add(z2h(toHiragana(s)));
      add(s.replace(/^\s+|\s+$/g,''));  // 念のため再trim

      return Array.from(list).map(v => IMG_BASE + v);
    }

    // 成功した解決結果をキャッシュ
    const resolveCache = new Map(); // key: original filename, val: resolved URL

    // フォールバック付きローダ
    function loadWithFallback(imgEl, filename){
      const urls = resolveCache.get(filename) ? [resolveCache.get(filename)] : candidates(filename);
      const tried = [];
      return new Promise((resolve) => {
        const tryNext = (i=0) => {
          if(i >= urls.length){
            console.warn('画像解決失敗', { filename, tried });
            imgEl.removeAttribute('src');
            resolve(false);
            return;
          }
          const url = urls[i];
          tried.push(url);
          const tester = new Image();
          tester.onload = () => {
            resolveCache.set(filename, url);
            imgEl.src = url;
            resolve(true);
          };
          tester.onerror = () => tryNext(i+1);
          // 軽いキャッシュバスター（CDN/Pagesの残骸対策）
          tester.src = url + (url.includes('?') ? '&' : '?') + 'v=1';
        };
        tryNext();
      });
    }

    // ===== 元のロジック =====
    function stripExt(name){ return String(name).replace(/\.[^.]+$/, ""); }
    function shuffle(arr){
      const a = arr.slice();
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
      }
      return a;
    }

    let cards = [];
    let order = [];
    let idx = 0;

    // 既存要素
    const reading = document.getElementById('reading');
    const titleEl = document.getElementById('title');
    const stars = document.getElementById('stars');
    const count = document.getElementById('count');
    const art = document.getElementById('art');

    async function render(){
      if(!cards.length) return;
      const i = order[idx];
      const item = cards[i];
      const title = stripExt(item.filename || '');

      reading.textContent = item.reading || '';
      titleEl.textContent = title;
      stars.textContent = item.difficulty || '';
      count.textContent = `${idx+1} / ${cards.length}`;

      // 本画像（フォールバック付き）
      await loadWithFallback(art, item.filename);

      // 次の画像をプリロード（同じ解決ロジックを尊重）
      const nextIdx = (idx + 1) % order.length;
      const nextItem = cards[order[nextIdx]];
      if(nextItem){
        const preload = new Image();
        const resolved = resolveCache.get(nextItem.filename);
        preload.src = resolved || (candidates(nextItem.filename)[0] ?? '');
      }
    }

    function next(){ idx = (idx + 1) % order.length; render(); }
    function prev(){ idx = (idx - 1 + order.length) % order.length; render(); }
    function onKey(e){
      if(e.key === 'ArrowRight' || e.key === 'Enter' || e.key === ' '){ next(); }
      if(e.key === 'ArrowLeft'){ prev(); }
    }

    async function boot(){
      try{
        const res = await fetch(DATA_URL, {cache:'no-store'});
        if(!res.ok) throw new Error('マニフェストを読み込めませんでした');
        const raw = await res.json();
        cards = raw.filter(r => r.filename && typeof r.filename === 'string');
        if(!cards.length) throw new Error('カードがありません');
        order = shuffle([...cards.keys()]);
        idx = 0;
        render();
      }catch(err){
        titleEl.textContent = '読み込みエラー';
        reading.textContent = err.message;
      }
    }

    document.getElementById('next').addEventListener('click', next);
    document.getElementById('prev').addEventListener('click', prev);
    document.getElementById('card').addEventListener('click', next);
    window.addEventListener('keydown', onKey);

    boot();
  </script>
</body>
</html>
