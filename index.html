<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>早口言葉アプリ（試作）</title>
  <style>
    :root{
      --bg:#fff8ef; --ink:#1f1e1c; --muted:#6b6a68; --card:#ffffff; --accent:#4f8cff;
    }
    html,body{height:100%;}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",sans-serif;}
    .app{min-height:100%;display:grid;grid-template-rows:auto 1fr auto;}
    .topbar{display:flex;gap:12px;align-items:center;justify-content:space-between;padding:12px 16px;}
    .brand{font-weight:800;letter-spacing:.02em;}

    .card{margin:0 12px 12px;background:var(--card);border-radius:20px;box-shadow:0 8px 24px rgba(0,0,0,.08);display:grid;grid-template-rows:auto 1fr auto;min-height:calc(100vh - 120px);}    

    /* ==== テキストを上、読み(ひらがな)を一番上に ==== */
    .text{padding:16px 16px 0;}
    .reading{order:-1;margin:0 0 6px 0;color:var(--muted);font-size:clamp(18px, 3.8vw, 30px);}
    .title{font-weight:900;line-height:1.22;font-size:clamp(22px, 4.6vw, 44px);}  

    .stage{display:grid;place-items:center;padding:8px 8px 0;}
    .imgwrap{width:100%;height:100%;display:grid;place-items:center;padding:8px;}
    img.art{max-width:100%;max-height:60vh;object-fit:contain;border-radius:16px;background:#f2eee8;}

    .meta{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 16px;}
    .stars{font-size:clamp(18px, 4vw, 32px);} 
    .tap{color:var(--muted);font-size:14px;text-align:center;margin-top:-6px;margin-bottom:6px;}

    .controls{display:flex;gap:10px;align-items:center;justify-content:center;padding:12px 16px 20px;}
    button{appearance:none;border:0;border-radius:14px;padding:14px 18px;font-size:18px;font-weight:700;cursor:pointer;background:var(--ink);color:#fff;box-shadow:0 6px 16px rgba(0,0,0,.15);} 
    button.secondary{background:#e9e7e2;color:#222;}

    /* ローディング中でもテキストは即表示される設計 */
    .loading-hint{visibility:visible;color:var(--muted);font-size:14px;text-align:center}
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">早口言葉アプリ（試作）</div>
      <div id="count" aria-live="polite" style="color:var(--muted);"></div>
    </header>

    <main class="card" id="card" title="画面タップでも次へ進めます">
      <!-- テキストを最上段に配置（読み → 漢字） -->
      <div class="text">
        <div class="reading" id="reading"></div>
        <div class="title" id="title">読み込み中…</div>
      </div>

      <!-- イメージを下段に配置（テキストと同時に表示開始） -->
      <div class="stage" id="stage">
        <div class="imgwrap">
          <img class="art" id="art" alt="イラスト" decoding="async" loading="eager" />
        </div>
        <div class="loading-hint" id="loadingHint"></div>
      </div>

      <div class="meta">
        <div class="stars" id="stars" aria-label="難易度"></div>
        <div class="tap">（タップでも次へ）</div>
      </div>
    </main>

    <footer class="controls">
      <button id="prev" class="secondary" title="ひとつ前">← もどる</button>
      <button id="next" title="次のカード">次へ →</button>
    </footer>
  </div>

  <script>
    // ===== 設定 =====
    const DATA_URL = "data/hayakuchikotoba_manifest.json"; // マニフェスト
    const IMG_BASE = "images/"; // 画像フォルダ

    // ===== 状態 =====
    let cards = []; // {filename, reading, difficulty}
    let order = []; // インデックスのシャッフル順
    let idx = 0;    // 現在位置

    function shuffle(arr){
      const a = arr.slice();
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
      }
      return a;
    }
    function stripExt(name){ return name.replace(/\.[^.]+$/, ""); }

    // 先読みで次の画像をキャッシュ
    function preloadNext(){
      if(!cards.length) return;
      const nextI = order[(idx + 1) % order.length];
      const nextItem = cards[nextI];
      if(nextItem){
        const img = new Image();
        img.decoding = 'async';
        img.loading = 'eager';
        img.src = encodeURI(IMG_BASE + nextItem.filename);
      }
    }

    function render(){
      if(!cards.length) return;
      const i = order[idx];
      const item = cards[i];
      const title = stripExt(item.filename);

      // まずテキストを即表示（画像の読み込み待ちをしない）
      const titleEl = document.getElementById('title');
      const readingEl = document.getElementById('reading');
      const starsEl = document.getElementById('stars');
      const countEl = document.getElementById('count');
      const hintEl = document.getElementById('loadingHint');

      titleEl.textContent = title;                 // 漢字・カタカナタイトル
      readingEl.textContent = item.reading || '';  // ひらがな（上段）
      starsEl.textContent = item.difficulty || '';
      countEl.textContent = `${idx+1} / ${cards.length}`;

      // 次に画像を読み込む（読み込み中はヒント表示）
      const art = document.getElementById('art');
      hintEl.textContent = '画像を読み込み中…';
      art.onload = () => { hintEl.textContent = ''; };
      art.onerror = () => { hintEl.textContent = '画像が見つかりません'; };
      art.src = encodeURI(IMG_BASE + item.filename);
      art.alt = title;

      // 次の画像を先読み
      preloadNext();
    }

    function next(){ if(!cards.length) return; idx = (idx + 1) % order.length; render(); }
    function prev(){ if(!cards.length) return; idx = (idx - 1 + order.length) % order.length; render(); }
    function onKey(e){ if(e.key==='ArrowRight'||e.key==='Enter'||e.key===' '){next();} if(e.key==='ArrowLeft'){prev();} }

    async function boot(){
      try{
        const res = await fetch(DATA_URL, {cache:'no-store'});
        if(!res.ok) throw new Error('マニフェストを読み込めませんでした');
        const raw = await res.json();
        cards = raw.filter(r => r.filename && typeof r.filename === 'string');
        if(!cards.length) throw new Error('カードがありません');
        order = shuffle([...cards.keys()]);
        idx = 0;
        render();
      }catch(err){
        document.getElementById('title').textContent = '読み込みエラー';
        document.getElementById('reading').textContent = err.message;
      }
    }

    document.getElementById('next').addEventListener('click', next);
    document.getElementById('prev').addEventListener('click', prev);
    document.getElementById('card').addEventListener('click', next);
    window.addEventListener('keydown', onKey);

    boot();
  </script>
</body>
</html>
